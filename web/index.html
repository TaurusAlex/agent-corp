            const list = allAgents;
            const filtered = list.filter(a => {
                const code = a.industry_code || '';
                if (currentTab === "P") return code.startsWith('A');
                if (currentTab === "S") return code.startsWith('B') || code.startsWith('C') || code.startsWith('D') || code.startsWith('E');
                return !code.startsWith('A') && !code.startsWith('B') && !code.startsWith('C') && !code.startsWith('D') && !code.startsWith('E');
            });
            
            const search = document.getElementById("searchInput").value.toLowerCase();
            let finalList = filtered;
            if (search) {
                finalList = filtered.filter(a => 
                    (a.industry && a.industry.toLowerCase().includes(search)) || 
                    (a.role && a.role.toLowerCase().includes(search)) ||
                    (a.industry_code && a.industry_code.toLowerCase().includes(search))
                );
            }
            
            // 分组
            const grouped = {};
            finalList.forEach(a => {
                const key = a.industry_code || 'other';
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(a);
            });
            
            let html = "";
            let count = 0;
            for (let code in grouped) {
                if (count >= 10) break;
                const name = grouped[code][0].industry || code;
                html += `<div class="section"><div class="section-title">${code} - ${name}</div><div class="grid">`;
                html += grouped[code].slice(0, 4).map(a => `
                    <div class="card" onclick="showDetail('${(a.industry_code||'')+a.role+(a.lang||'')}')">
                        <div class="card-name">${a.role}</div>
                        <div class="card-desc">${a.lang}</div>
                    </div>
                `).join("");
                html += "</div></div>";
                count++;
            }
            
            document.getElementById("main").innerHTML = html || '<div style="text-align:center;color:var(--text3)">No agents</div>';
        }
        
        function showDetail(key) {
            const a = allAgents.find(x => ((x.industry_code||'')+x.role+(x.lang||'')) === key);
            if (!a) return;
            
            document.getElementById("modalTitle").textContent = a.role + " · " + a.lang;
            document.getElementById("modalMeta").textContent = a.industry_code + " · " + a.industry;
            
            const content = a.content || "";
            const blob = new Blob([content], {type: 'text/markdown'});
            const url = URL.createObjectURL(blob);
            document.getElementById("downloadBtn").href = url;
            document.getElementById("downloadBtn").download = (a.industry_code || 'agent') + '-' + a.role + '.md';
            document.getElementById("mdContent").textContent = content;
            
            document.getElementById("modal").classList.add("show");
        }
        
        function showImport() {
            document.getElementById("modalTitle").textContent = t[lang].import;
            document.getElementById("modalBody").innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">Drop .md files here</div>';
            document.getElementById("modal").classList.add("show");
        }
        
        function showUpload() {
            document.getElementById("modalTitle").textContent = t[lang].upload;
            document.getElementById("modalBody").innerHTML = '<div style="text-align:center;padding:40px;color:var(--text3)">Upload your agent</div>';
            document.getElementById("modal").classList.add("show");
        }
        
        function closeModal() { document.getElementById("modal").classList.remove("show"); }
        
        document.getElementById("searchInput").addEventListener("input", render);
        
        setLang("en");
    </script>
</body>
</html>
